name: hookcatcher

services:

  server:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      # inside Docker: use service name, not localhost
      MONGO_HOST: mongodb
      POSTGRES_HOST: postgres  
      # inside Docker: use standard ports
      POSTGRES_PORT: 5432
      MONGO_PORT: 27017
    depends_on:
      - mongodb
      - postgres
      - otel-collector

  mongodb:
    image: mongo:8.0-noble
    container_name: mongodb
    restart: always
    ports:
      - '$MONGO_PORT:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: $MONGO_USER
      MONGO_INITDB_ROOT_PASSWORD: $MONGO_PASSWORD
    volumes:
      - mongo_data:/data/db

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: $POSTGRES_NAME
      POSTGRES_USER: $POSTGRES_USER
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
    ports:
      - "$POSTGRES_PORT:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/db_connections/postgres/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
  
  # https://opentelemetry.io/docs/collector/install/docker/
  otel-collector:
    image: otel/opentelemetry-collector
    env_file: .env
    environment:
      HONEYCOMB_API_KEY: ${HONEYCOMB_API_KEY}
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml
    ports:
      - 1888:1888 # pprof extension
      - 8888:8888 # Prometheus metrics exposed by the Collector
      - 8889:8889 # Prometheus exporter metrics
      - 13133:13133 # health_check extension
      - 4317:4317 # OTLP gRPC receiver
      - 4318:4318 # OTLP http receiver
      - 55679:55679 # zpages extension

volumes:
  mongo_data:
  pgdata:
