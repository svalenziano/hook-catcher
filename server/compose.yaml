services:
  mongodb:
    image: mongo:8.0-noble
    container_name: mongodb
    restart: always
    ports:
      - '$MONGO_PORT:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: $MONGO_USER
      MONGO_INITDB_ROOT_PASSWORD: $MONGO_PASSWORD
    volumes:
      - mongo_data:/etc/data/mongo
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: $DB_NAME
      POSTGRES_USER: $POSTGRES_USER
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
    ports:
      - "$POSTGRES_PORT:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/db/schema.sql:/docker-entrypoint-
volumes:
  mongo_data:
  pgdata:
